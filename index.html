<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paul Murphy — Summer 2026 Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --ink: #14161a;
  --muted: #6b7280;
  --line: #e6e8ec;
  --bg: #fbfbfc;
  --card: #ffffff;
  --accent: #2f6bff;
  --radius: 16px;
  --maxw: 1080px;
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Hanken Grotesk', system-ui, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }

/* ── Header ───────────────────────────────── */
header {
  padding: 96px 0 56px;
  border-bottom: 1px solid var(--line);
}
.eyebrow {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--accent);
  margin: 0 0 18px;
}
h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: clamp(34px, 6vw, 60px);
  line-height: 1.04;
  letter-spacing: -0.02em;
  margin: 0 0 18px;
  max-width: 16ch;
  text-wrap: balance;
}
.lede {
  font-size: clamp(16px, 2vw, 19px);
  color: var(--muted);
  margin: 0;
  max-width: 52ch;
  text-wrap: pretty;
}

/* ── Section label ────────────────────────── */
.section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 16px; margin: 56px 0 24px;
}
.section-head h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px; font-weight: 600; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--muted);
  margin: 0;
}
.count { font-size: 14px; color: var(--muted); font-variant-numeric: tabular-nums; }

/* ── Grid ─────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 22px;
  padding-bottom: 80px;
}

/* ── Card ─────────────────────────────────── */
.card {
  display: flex; flex-direction: column;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
}
a.card:hover {
  border-color: #cdd5e4;
  box-shadow: 0 14px 34px -18px rgba(20,30,60,0.28);
  transform: translateY(-3px);
}

/* thumbnail: shows image if present, styled placeholder if not */
.thumb {
  position: relative;
  aspect-ratio: 16 / 10;
  background: #f1f3f7;
  display: block;
  overflow: hidden;
}
.thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.thumb .placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background:
    linear-gradient(135deg, #f5f7fb 0%, #eef1f7 100%);
  color: #aab2c2;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
}

/* hide placeholder when a real <img> has loaded */
.thumb.has-image .placeholder { display: none; }

.card-body {
  padding: 18px 20px 20px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex: 1;
}
.card-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600; font-size: 19px; letter-spacing: -0.01em;
  margin: 0;
}
.arrow {
  flex-shrink: 0; width: 20px; height: 20px; color: #b7bfce;
  transition: transform .18s ease, color .18s ease;
}
a.card:hover .arrow { color: var(--accent); transform: translate(2px, -2px); }

/* ── Placeholder / "next" card ────────────── */
.card.empty {
  border-style: dashed;
  background: transparent;
  box-shadow: none;
}
.card.empty .thumb {
  background: transparent;
}
.card.empty .placeholder {
  background: transparent;
  color: #c2c8d4;
}
.card.empty .card-title { color: #aab2c2; font-weight: 500; }
.card.empty .arrow { display: none; }

/* ── Footer ───────────────────────────────── */
footer {
  border-top: 1px solid var(--line);
  padding: 30px 0 60px;
}
.foot-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
  color: var(--muted); font-size: 14px;
}
.foot-row a { border-bottom: 1px solid transparent; transition: border-color .15s; }
.foot-row a:hover { border-color: var(--muted); }

@media (max-width: 560px) {
  header { padding: 64px 0 40px; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <p class="eyebrow">Summer 2026</p>
    <h1>Paul Murphy — Summer 2026 Projects</h1>
    <p class="lede">A growing collection of things I'm building this summer. Each card links to a live project.</p>
  </div>
</header>

<main class="wrap">
  <div class="section-head">
    <h2>Projects</h2>
    <span class="count" id="count"></span>
  </div>

  <section class="grid" id="grid">

    <!-- ============================================================
         PROJECT CARD TEMPLATE — copy one block per project.
         • href → the live GitHub Pages URL
         • img src → put a screenshot at thumbnails/<name>.png and
                     set the path here. If the file is missing, a
                     clean placeholder shows automatically.
         ============================================================ -->

    <a class="card" href="https://murphypdm.github.io/M590IntegralApp/" target="_blank" rel="noopener">
      <span class="thumb">
        <img src="integral-app.png" alt="" loading="lazy"
             onload="this.closest('.thumb').classList.add('has-image')"
             onerror="this.remove()">
        <span class="placeholder">Add thumbnail</span>
      </span>
      <span class="card-body">
        <h3 class="card-title">Integral Quest</h3>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg>
      </span>
    </a>

    <a class="card" href="https://murphypdm.github.io/PA-Campus-History/" target="_blank" rel="noopener">
      <span class="thumb">
        <img src="pa-campus-history-thumb.jpg" alt="PA Campus in winter at sunset" loading="lazy"
             onload="this.closest('.thumb').classList.add('has-image')"
             onerror="this.remove()">
        <span class="placeholder">Add thumbnail</span>
      </span>
      <span class="card-body">
        <h3 class="card-title">PA Campus History</h3>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg>
      </span>
    </a>

    <!-- Placeholder cards — replace these as you add projects, or delete them. -->
    <div class="card empty">
      <span class="thumb"><span class="placeholder">Coming soon</span></span>
      <span class="card-body"><h3 class="card-title">Next project</h3></span>
    </div>

  </section>
</main>

<footer>
  <div class="wrap foot-row">
    <span>© <span id="year"></span> Paul Murphy</span>
    <a href="https://github.com/murphypdm" target="_blank" rel="noopener">github.com/murphypdm</a>
  </div>
</footer>

<script>
  // Live project count (cards that are real links, not placeholders)
  document.getElementById('count').textContent =
    document.querySelectorAll('.grid a.card').length + ' live';

  document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
